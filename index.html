<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>라이터스룸 · 공개 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B2F; --muted:#6C6C84; --faint:#9A9AB0;
    --line:#E8E8F1; --bg:#FAFAFD; --card:#FFFFFF;
    --spine:#2D2A6E; --spine-2:#403B9E; --soft:#F1F1F8;
    --warn-bg:#FFF6E2; --warn-ink:#7A5C00; --warn-line:#F2C94C;
    --ok:#1A9D6A; --danger:#D8443B;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(20,20,50,.05), 0 10px 30px rgba(20,20,50,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink);
    font-family:'Noto Sans KR','Noto Sans JP',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1080px; margin:0 auto; padding:0 18px 64px}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:700}
  a{color:inherit}

  .topbar{position:sticky; top:0; z-index:20; background:rgba(250,250,253,.86);
    backdrop-filter:saturate(160%) blur(8px); border-bottom:1px solid var(--line);}
  .topbar .inner{max-width:1080px; margin:0 auto; padding:14px 18px; display:flex; align-items:center; gap:10px}
  .brand{display:flex; align-items:baseline; gap:10px; min-width:0}
  .brand h1{font-size:18px; font-weight:900; letter-spacing:-.01em; margin:0; white-space:nowrap}
  .brand .sub{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .who{margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px}
  .langbtn,.adminbtn{appearance:none; border-radius:999px; padding:6px 12px; font:inherit; font-size:12px; font-weight:800; cursor:pointer; transition:filter .15s}
  .langbtn{border:1px solid #DAD8F6; background:#EEEDFB; color:var(--spine)}
  .langbtn:hover{filter:brightness(.97)}
  .adminbtn{border:1px solid var(--line); background:#fff; color:var(--muted)}
  .adminbtn:hover{background:var(--soft); color:var(--ink)}
  .langbtn:focus-visible,.adminbtn:focus-visible{outline:2px solid var(--spine-2); outline-offset:2px}
  .badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:#F3F3F8}
  .badge.live{color:var(--ok); background:#E6F6EF; border-color:#BFE8D5}

  .setup{margin:14px 0; background:var(--warn-bg); border:1px solid var(--warn-line); border-radius:var(--radius); padding:14px 16px; color:var(--warn-ink); font-size:13px}
  .setup b{display:block; margin-bottom:4px}
  .setup code{background:#fff; border:1px solid var(--warn-line); border-radius:6px; padding:1px 6px; font-size:12px}

  .tabs{display:flex; gap:4px; margin:20px 0 8px; overflow-x:auto; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{appearance:none; border:0; background:transparent; cursor:pointer; padding:10px 16px;
    border-radius:999px; font:inherit; font-weight:700; color:var(--muted); white-space:nowrap; transition:background .18s,color .18s}
  .tab:hover{color:var(--ink); background:var(--soft)}
  .tab[aria-selected="true"]{color:#fff; background:var(--spine)}
  .tab:focus-visible{outline:2px solid var(--spine-2); outline-offset:2px}

  .view{animation:fade .26s ease both}
  @keyframes fade{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  .editflag{display:inline-block; margin-left:8px; font-size:11px; font-weight:800; color:#fff; background:var(--ok); padding:2px 9px; border-radius:999px; vertical-align:middle}

  .chips{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:14px 0 8px}
  .chip{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow)}
  .chip .k{font-size:12px; color:var(--muted); font-weight:600}
  .chip .v{font-size:24px; font-weight:900; letter-spacing:-.02em; margin-top:2px}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  .team{position:relative; overflow:hidden; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 18px 16px 22px; transition:transform .15s,box-shadow .15s}
  .team:hover{transform:translateY(-2px); box-shadow:0 12px 34px rgba(20,20,50,.10)}
  .team::before{content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:var(--tc)}
  .team .glyph{position:absolute; right:10px; top:-10px; font-size:92px; font-weight:900; line-height:1; color:var(--tc); opacity:.10; letter-spacing:-.04em; pointer-events:none; user-select:none}
  .team .head{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .team .name{font-size:16px; font-weight:900}
  .team .cm{font-size:12px; color:#fff; background:var(--tc); padding:2px 9px; border-radius:999px; font-weight:700}
  .team .count{margin-left:auto; font-size:12px; color:var(--faint); font-weight:700}
  .members{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px}
  .members:empty{display:none}
  .m{display:inline-flex; align-items:center; gap:4px; background:var(--soft); border:1px solid var(--line); border-radius:999px; padding:4px 10px; font-size:12.5px}
  .m .note{color:var(--faint); font-size:11px}
  .chip-del{cursor:pointer; color:var(--danger); font-weight:900; margin-left:3px; font-size:11px}
  .docs{display:inline-flex; align-items:center; gap:7px; text-decoration:none; font-weight:700; font-size:13px;
    color:var(--tc); padding:9px 14px; border-radius:var(--radius-sm); border:1px solid var(--tc); background:#fff; transition:background .15s,color .15s}
  .docs:hover{background:var(--tc); color:#fff}
  .docs.disabled{color:var(--faint); border-color:var(--line); pointer-events:none; background:var(--soft)}

  .smallbtn{appearance:none; border:0; background:var(--spine); color:#fff; border-radius:8px; padding:7px 11px; font:inherit; font-size:12px; font-weight:700; cursor:pointer}
  .smallbtn:hover{filter:brightness(1.08)}
  .mini,.team-edit{display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
  .team-edit{border-top:none; padding-top:4px}
  .mini input,.team-edit input{width:auto; flex:1; min-width:84px; padding:7px 9px; font-size:12.5px}
  .mini select{width:auto; padding:7px 9px; font-size:12.5px}
  .newteam{border-style:dashed; align-items:center}

  .ov{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:8px 0 22px}
  .ov .c{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 16px 14px; box-shadow:var(--shadow)}
  .ov .n{font-size:12px; font-weight:900; color:var(--spine); letter-spacing:.08em}
  .ov .d{font-size:15px; font-weight:800; margin:2px 0}
  .ov .t{font-size:12px; color:var(--muted); margin-bottom:8px}
  .ov .mode{font-size:11px; color:var(--spine); background:#EEEDFB; border-radius:8px; padding:5px 8px; margin-bottom:10px; line-height:1.4}
  .ov ul{margin:0; padding-left:16px} .ov li{font-size:12.5px; margin:2px 0}
  .week{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:14px; overflow:hidden}
  .week>summary{list-style:none; cursor:pointer; display:flex; align-items:center; gap:12px; padding:16px 18px}
  .week>summary::-webkit-details-marker{display:none}
  .week .wtag{font-weight:900; font-size:15px} .week .wdate{color:var(--muted); font-size:13px; font-weight:600}
  .week .chev{margin-left:auto; color:var(--faint); transition:transform .2s} .week[open] .chev{transform:rotate(90deg)}
  .week .body{padding:0 18px 18px}
  .srow{display:grid; grid-template-columns:120px 1fr; gap:10px; padding:9px 0; border-top:1px solid var(--line); align-items:start}
  .srow .tm{font-weight:700; color:var(--muted); font-size:12.5px} .srow .who2{color:var(--muted); font-size:12.5px; text-align:right}
  .hw{margin-top:14px; background:var(--warn-bg); border:1px solid var(--warn-line); border-left:4px solid var(--warn-line); border-radius:var(--radius-sm); padding:12px 14px}
  .hw .ht{font-weight:800; color:var(--warn-ink); margin-bottom:6px; font-size:13px}
  .hw .hb{font-size:12.5px; color:#5D4E00} .hw .hb div{margin:2px 0}
  .deadline{display:inline-flex; align-items:center; gap:5px; margin-top:8px; background:var(--danger); color:#fff; font-weight:800; font-size:12.5px; padding:5px 13px; border-radius:999px; box-shadow:0 2px 6px rgba(216,68,59,.28)}

  .fb-layout{display:grid; grid-template-columns:360px 1fr; gap:18px; align-items:start}
  .composer{position:sticky; top:78px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px}
  .composer h3{margin:0 0 4px; font-size:15px; font-weight:900}
  .composer p.hint{margin:0 0 14px; font-size:12px; color:var(--muted)}
  .field{margin-bottom:11px} .field label{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin-bottom:5px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  select,input,textarea{width:100%; font:inherit; color:var(--ink); background:#fff; border:1px solid var(--line); border-radius:var(--radius-sm); padding:9px 11px}
  select:focus,input:focus,textarea:focus{outline:2px solid var(--spine-2); border-color:transparent}
  textarea{min-height:96px; resize:vertical}
  .hp{position:absolute; left:-9999px; width:1px; height:1px; opacity:0}
  .btn{width:100%; margin-top:4px; border:0; cursor:pointer; font:inherit; font-weight:800; background:var(--spine); color:#fff; padding:12px; border-radius:var(--radius-sm); transition:filter .15s,transform .1s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)} .btn:disabled{opacity:.55; cursor:default}
  .form-msg{font-size:12px; margin-top:9px; min-height:16px} .form-msg.err{color:var(--danger)} .form-msg.ok{color:var(--ok)}

  .feed-head{display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap}
  .feed-head .ft{font-weight:900; font-size:15px}
  .feed-head select{width:auto; padding:7px 28px 7px 10px; font-size:12.5px}
  .feed-head .spacer{flex:1} .feed-head .cnt{font-size:12px; color:var(--faint); font-weight:700}
  .refresh{appearance:none; border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 12px; font:inherit; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer}
  .refresh:hover{background:var(--soft); color:var(--ink)}

  .comment{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:15px 16px; margin-bottom:12px}
  .comment.fresh{animation:pop .35s ease both}
  @keyframes pop{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none}}
  .meta{display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:9px}
  .pill{font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; background:var(--soft); border:1px solid var(--line); color:var(--muted)}
  .pill.team{color:#fff; border:0} .pill.week{color:var(--spine); background:#EEEDFB; border-color:#DAD8F6}
  .meta .writer{font-weight:800; font-size:13px} .meta .right{margin-left:auto; font-size:11.5px; color:var(--faint)}
  .orig{font-size:14px; margin-bottom:10px; white-space:pre-wrap}
  .langs{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .lang{background:var(--soft); border:1px solid var(--line); border-radius:var(--radius-sm); padding:9px 11px}
  .lang .lh{font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); font-weight:700; margin-bottom:3px}
  .lang .lt{font-size:13px; white-space:pre-wrap}
  .empty{background:var(--card); border:1px dashed var(--line); border-radius:var(--radius); padding:34px 20px; text-align:center; color:var(--muted)}
  .empty .big{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:4px}
  .center-load{padding:60px 0; text-align:center; color:var(--muted); font-weight:600}

  .modal-bg{position:fixed; inset:0; background:rgba(20,20,40,.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:18px}
  .gate{position:fixed; inset:0; z-index:100; background:linear-gradient(160deg,#1B1B2F,#2D2A6E); display:flex; align-items:center; justify-content:center; padding:20px}
  .gate .box{background:#fff; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); padding:30px 26px; width:360px; max-width:100%; text-align:center}
  .gate .lock{font-size:34px}
  .gate h2{margin:8px 0 2px; font-size:19px; font-weight:900; letter-spacing:-.01em}
  .gate p{margin:0 0 18px; font-size:12.5px; color:var(--muted)}
  .gate input{text-align:center; font-size:16px; letter-spacing:.05em; padding:12px}
  .gate .btn{margin-top:12px}
  .gate .gmsg{font-size:12px; color:var(--danger); min-height:16px; margin-top:8px; font-weight:700}
  .modal{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; width:360px; max-width:100%}
  .modal h3{margin:0 0 14px; font-size:16px; font-weight:900}
  .modal .actions{display:flex; gap:8px; margin-top:6px}

  @media (max-width:880px){.chips{grid-template-columns:repeat(2,1fr)} .grid{grid-template-columns:1fr} .ov{grid-template-columns:1fr 1fr} .fb-layout{grid-template-columns:1fr} .composer{position:static}}
  @media (max-width:560px){.ov{grid-template-columns:1fr} .srow{grid-template-columns:88px 1fr} .srow .who2{grid-column:1/-1; text-align:left; color:var(--faint)} .langs{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <div class="brand"><h1>라이터스룸</h1><span class="sub" id="brandSub"></span></div>
    <div class="who">
      <button class="adminbtn" id="adminBtn" style="display:none"></button>
      <button class="langbtn" id="langBtn">日本語</button>
      <span class="badge" id="statusBadge"></span>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="setupBanner"></div>
  <div class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true"  data-view="dash"></button>
    <button class="tab" role="tab" aria-selected="false" data-view="program"></button>
    <button class="tab" role="tab" aria-selected="false" data-view="feedback"></button>
  </div>
  <div id="root"><div class="center-load"></div></div>
</div>

<div class="gate" id="gate" style="display:none">
  <div class="box">
    <div class="lock">🔒</div>
    <h2>라이터스룸</h2>
    <p>비밀번호를 입력해 주세요<br>パスワードを入力してください</p>
    <input id="gate_pw" type="password" autocomplete="off" placeholder="비밀번호 / パスワード">
    <button class="btn" id="gate_go">입장 · 入場</button>
    <div class="gmsg" id="gate_msg"></div>
  </div>
</div>

<div class="modal-bg" id="loginModal" style="display:none">
  <div class="modal">
    <h3 id="lg_title"></h3>
    <div class="field"><label id="lg_email_l"></label><input id="lg_email" type="email" autocomplete="username"></div>
    <div class="field"><label id="lg_pw_l"></label><input id="lg_pw" type="password" autocomplete="current-password"></div>
    <div class="form-msg err" id="lg_msg"></div>
    <div class="actions"><button class="btn" id="lg_do" style="flex:1"></button><button class="refresh" id="lg_cancel"></button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ════════════════════ 앱 본체 ════════════════════ -->
<script>
let LANG='ko';
const STATE = { view:'dash', filterWeek:'', filterTeam:'', comments:[], roster:[], ready:false, status:'connecting', isAdmin:false };
const CONFIGURED = !/YOUR-PROJECT|YOUR-ANON/.test(SUPABASE_URL + SUPABASE_ANON_KEY);
let db = null;
if (CONFIGURED && window.supabase) db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function t(k){ return (T[LANG] && T[LANG][k] != null) ? T[LANG][k] : (T.ko[k]||k); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function attr(s){ return esc(s); }
function tcolor(tm){ return TEAM_COLORS[tm] || '#5F6368'; }
function flag(c){ const u=String(c||'').toUpperCase(); return u==='KR'?'🇰🇷':u==='JP'?'🇯🇵':'🏳️'; }
function weekLabel(v){ return LANG==='ja' ? (WEEK_JA[v]||v) : v; }
function prog(){ return PROGRAM[LANG] || PROGRAM.ko; }
function val(id){ const el=document.getElementById(id); return el?el.value:''; }

/* 번역 */
function detectLang(x){ if(/[\uAC00-\uD7A3]/.test(x)) return 'ko'; if(/[\u3040-\u30FF]/.test(x)) return 'ja'; return 'ko'; }
async function mm(text, source, target){
  try{ const u='https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+source+'|'+target+(MYMEMORY_EMAIL?'&de='+encodeURIComponent(MYMEMORY_EMAIL):'');
    const r=await fetch(u); const j=await r.json(); return (j&&j.responseData&&j.responseData.translatedText)||''; }catch(e){ return ''; }
}
async function bilingual(text){ const s=detectLang(text); return s==='ko'?{ko:text,ja:await mm(text,'ko','ja')}:{ja:text,ko:await mm(text,'ja','ko')}; }

/* ── 정적 요소 이벤트 (1회) ── */
document.getElementById('langBtn').addEventListener('click', ()=> setLang(LANG==='ko'?'ja':'ko'));
document.querySelectorAll('.tab').forEach(b=> b.addEventListener('click', ()=> switchView(b.dataset.view)));
document.getElementById('adminBtn').addEventListener('click', ()=> STATE.isAdmin ? doLogout() : openModal());
document.getElementById('lg_do').addEventListener('click', doLogin);
document.getElementById('lg_cancel').addEventListener('click', closeModal);
document.getElementById('loginModal').addEventListener('click', e=>{ if(e.target.id==='loginModal') closeModal(); });

function setLang(l){ LANG=l; document.documentElement.lang=l; applyChrome(); render(); }
function switchView(v){ STATE.view=v; document.querySelectorAll('.tab').forEach(b=> b.setAttribute('aria-selected', b.dataset.view===v?'true':'false')); render(); }

function applyChrome(){
  document.getElementById('brandSub').textContent=t('brandSub');
  document.getElementById('langBtn').textContent=t('langBtn');
  const tabs=document.querySelectorAll('.tab');
  tabs[0].textContent=t('tabDash'); tabs[1].textContent=t('tabProgram'); tabs[2].textContent=t('tabFeedback');
  const ab=document.getElementById('adminBtn');
  if(!CONFIGURED){ ab.style.display='none'; } else { ab.style.display=''; ab.textContent = STATE.isAdmin? t('adminLogout') : t('adminLogin'); }
  const badge=document.getElementById('statusBadge');
  if(STATE.status==='connected'){ badge.textContent=t('stConnected'); badge.className='badge live'; }
  else if(STATE.status==='unset'){ badge.textContent=t('stUnset'); badge.className='badge'; }
  else { badge.textContent=t('stConnecting'); badge.className='badge'; }
  document.getElementById('setupBanner').innerHTML = (STATE.status==='unset') ? '<div class="setup"><b>'+t('setupTitle')+'</b>'+t('setupBody')+'</div>' : '';
  // 모달 라벨
  document.getElementById('lg_title').textContent=t('loginTitle');
  document.getElementById('lg_email_l').textContent=t('loginEmail');
  document.getElementById('lg_pw_l').textContent=t('loginPw');
  document.getElementById('lg_do').textContent=t('loginDo');
  document.getElementById('lg_cancel').textContent=t('loginCancel');
}

/* ── 인증 ── */
async function checkSession(){ try{ const {data}=await db.auth.getSession(); STATE.isAdmin=!!(data&&data.session); }catch(e){ STATE.isAdmin=false; } }
function openModal(){ const m=document.getElementById('loginModal'); document.getElementById('lg_msg').textContent=''; m.style.display='flex'; const e=document.getElementById('lg_email'); if(e) e.focus(); }
function closeModal(){ document.getElementById('loginModal').style.display='none'; }
async function doLogin(){
  const email=val('lg_email'), password=val('lg_pw'); const msg=document.getElementById('lg_msg');
  msg.textContent='';
  try{
    const { error } = await db.auth.signInWithPassword({ email, password });
    if(error) throw error;
    STATE.isAdmin=true; closeModal(); await loadRoster(); applyChrome(); render();
  }catch(e){ msg.textContent=t('loginFail'); }
}
async function doLogout(){ try{ await db.auth.signOut(); }catch(e){} STATE.isAdmin=false; await loadRoster(); applyChrome(); render(); }

/* ── 기동 ── */
async function boot(){
  STATE.status = CONFIGURED ? 'connected' : 'unset';
  if(CONFIGURED){ await checkSession(); await Promise.all([loadRoster(), loadComments()]); }
  else { STATE.roster = ROSTER.slice(); }
  applyChrome(); STATE.ready=true; render();
}
async function loadRoster(){
  if(!db){ STATE.roster = ROSTER.slice(); return; }
  try{
    const tr = await db.from('teams').select('*').order('sort',{ascending:true});
    const mr = await db.from('members').select('*').order('sort',{ascending:true});
    if(tr.error||mr.error) throw (tr.error||mr.error);
    const teams=tr.data||[], members=mr.data||[];
    if(!teams.length){ STATE.roster = ROSTER.slice(); return; }
    STATE.roster = teams.map(tt=>({ team:tt.team, cm:tt.cm||'', docsUrl:tt.docs_url||'',
      members: members.filter(m=>m.team===tt.team).map(m=>({ id:m.id, name:m.name, country:m.country||'KR', note:m.note||'' })) }));
  }catch(e){ STATE.roster = ROSTER.slice(); }
}
async function loadComments(){
  if(!db) return;
  try{
    const { data, error } = await db.from('comments').select('*').order('created_at',{ascending:false}).limit(300);
    if(error) throw error;
    STATE.comments=(data||[]).map(r=>({ week:r.week||'', team:r.team||'', writer:r.writer||'', author:r.author||'',
      original:r.original||'', ko:r.ko||'', ja:r.ja||'', date:(r.created_at||'').slice(0,10) }));
  }catch(e){ STATE.comments=[]; }
}

/* ── 렌더 ── */
function render(){
  const root=document.getElementById('root');
  if(!STATE.ready){ root.innerHTML='<div class="center-load">'+t('loading')+'</div>'; return; }
  if(STATE.view==='dash') root.innerHTML=viewDash();
  else if(STATE.view==='program') root.innerHTML=viewProgram();
  else root.innerHTML=viewFeedback();
  wire();
}

function viewDash(){
  const all=STATE.roster, allMembers=all.reduce((a,x)=>a.concat(x.members||[]),[]);
  const kr=allMembers.filter(m=>String(m.country).toUpperCase()==='KR').length;
  const jp=allMembers.filter(m=>String(m.country).toUpperCase()==='JP').length;
  const shown = STATE.isAdmin ? all : all.filter(x=>x.members&&x.members.length);
  const editFlag = STATE.isAdmin ? '<span class="editflag">'+esc(t('editFlag'))+'</span>' : '';
  const chips=chip(t('cWriters'),allMembers.length+t('uPeople'))+chip(t('cTeams'),(all.length)+t('uTeams'))+chip(t('cKR'),kr+t('uPeople'))+chip(t('cJP'),jp+t('uPeople'));
  const folder=FOLDER_URL?'<a class="docs" style="--tc:#2D2A6E;margin-bottom:16px" href="'+attr(FOLDER_URL)+'" target="_blank" rel="noopener">'+esc(t('folderOpen'))+'</a>':'';

  let body;
  if(!shown.length){
    body='<div class="empty"><div class="big">'+esc(t('rosterEmptyTitle'))+'</div><div>'+esc(t('rosterEmptyBody'))+'</div></div>';
  } else {
    body='<div class="grid">'+shown.map(teamCard).join('')+(STATE.isAdmin?newTeamCard():'')+'</div>';
  }
  return '<div class="view"><div class="eyebrow">'+esc(t('ebRoster'))+editFlag+'</div><div class="chips">'+chips+'</div>'+folder+body+'</div>';
}
function chip(k,v){ return '<div class="chip"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div></div>'; }

function teamCard(x){
  const col=tcolor(x.team);
  const members=(x.members||[]).map(m=>{
    const del = (STATE.isAdmin && m.id) ? ' <span class="chip-del" data-id="'+attr(m.id)+'" title="'+attr(t('delConfirm'))+'">✕</span>' : '';
    return '<span class="m">'+flag(m.country)+' '+esc(m.name)+(m.note?' <span class="note">'+esc(m.note)+'</span>':'')+del+'</span>';
  }).join('');
  const docs = x.docsUrl
    ? '<a class="docs" style="--tc:'+col+'" href="'+attr(x.docsUrl)+'" target="_blank" rel="noopener">📄 TEAM_'+esc(x.team)+' '+esc(t('docsOpen'))+'</a>'
    : '<span class="docs disabled">'+esc(t('docsUnset'))+'</span>';
  let admin='';
  if(STATE.isAdmin){
    admin =
      '<div class="team-edit" data-team="'+attr(x.team)+'">'+
        '<input class="te-cm" value="'+attr(x.cm||'')+'" placeholder="'+attr(t('cmLabel'))+'">'+
        '<input class="te-docs" value="'+attr(x.docsUrl||'')+'" placeholder="'+attr(t('docsLabel'))+'">'+
        '<button class="smallbtn te-save" type="button">'+esc(t('saveBtn'))+'</button>'+
      '</div>'+
      '<div class="mini" data-team="'+attr(x.team)+'">'+
        '<input class="am-name" placeholder="'+attr(t('phMemberName'))+'">'+
        '<select class="am-country"><option value="KR">🇰🇷 KR</option><option value="JP">🇯🇵 JP</option></select>'+
        '<input class="am-note" placeholder="'+attr(t('phMemberNote'))+'">'+
        '<button class="smallbtn am-add" type="button">'+esc(t('addBtn'))+'</button>'+
      '</div>';
  }
  return '<div class="team" style="--tc:'+col+'"><div class="glyph">'+esc(x.team)+'</div>'+
    '<div class="head"><span class="name">TEAM '+esc(x.team)+'</span><span class="cm">CM · '+esc(x.cm||'-')+'</span><span class="count">'+(x.members||[]).length+t('uPeople')+'</span></div>'+
    '<div class="members">'+members+'</div>'+docs+admin+'</div>';
}
function newTeamCard(){
  return '<div class="team newteam" style="--tc:#9A9AB0">'+
    '<div class="mini" style="border-top:none;padding-top:0;margin-top:0">'+
      '<input id="nt-key" placeholder="'+attr(t('newTeamKey'))+'" style="max-width:120px">'+
      '<input id="nt-cm" placeholder="'+attr(t('cmLabel'))+'">'+
      '<button class="smallbtn" id="nt-add" type="button">'+esc(t('addTeamBtn'))+'</button>'+
    '</div></div>';
}

function viewProgram(){
  const p=prog();
  const ov=p.overview.map(o=>'<div class="c"><div class="n">'+esc(t('pgRound'))+' '+esc(o.no)+'</div><div class="d">'+esc(o.date)+'</div><div class="t">'+esc(o.time)+'</div><div class="mode">'+esc(o.mode)+'</div><ul>'+o.detail.map(d=>'<li>'+esc(d)+'</li>').join('')+'</ul></div>').join('');
  const weeks=p.weeks.map((w,i)=>{
    const rows=w.rows.map(r=>'<div class="srow"><div class="tm">'+esc(r[0])+'</div><div>'+esc(r[1])+'</div></div>').join('');
    const hb=w.hwBody.map(x=> /^(제출기한|提出期限)/.test(x) ? '<div><span class="deadline">⏰ '+esc(x)+'</span></div>' : '<div>'+esc(x)+'</div>').join('');
    const hl=(w.hwLinks||[]).map(l=>'<a href="'+attr(l.url)+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:9px;margin-right:10px;font-weight:800;color:#7A5C00;text-decoration:underline">📁 '+esc(l.label)+' ↗</a>').join('');
    return '<details class="week"'+(i===0?' open':'')+'><summary><span class="wtag">'+esc(w.tag)+'</span><span class="wdate">'+esc(w.date)+'</span><span class="chev">▶</span></summary>'+
      '<div class="body">'+rows+'<div class="hw"><div class="ht">'+esc(w.hwTitle)+'</div><div class="hb">'+hb+'</div>'+hl+'</div></div></details>';
  }).join('');
  return '<div class="view"><div class="eyebrow">'+esc(t('ebProgram'))+' · '+esc(p.period)+'</div><div class="ov">'+ov+'</div>'+weeks+
    '<div class="hw" style="margin-top:6px"><div class="ht">'+esc(t('pgNotice'))+'</div><div class="hb"><div>'+esc(p.finalNote)+'</div></div></div></div>';
}

function viewFeedback(){
  const teamOpts=STATE.roster.map(x=>x.team);
  const writerOpts=STATE.roster.reduce((a,x)=>a.concat((x.members||[]).map(m=>m.name)),[]);
  const wsel=writerOpts.length?selVals('f_writer',writerOpts,writerOpts.map(esc),''):'<input id="f_writer" placeholder="'+attr(t('phWriter'))+'">';
  const composer=!CONFIGURED
    ? '<div class="empty"><div class="big">'+esc(t('cpUnsetTitle'))+'</div><div>'+esc(t('cpUnsetBody'))+'</div></div>'
    : '<div class="composer"><h3>'+esc(t('cpTitle'))+'</h3><p class="hint">'+esc(t('cpHint'))+'</p>'+
      '<div class="field"><label>'+esc(t('lWriter'))+'</label>'+wsel+'</div>'+
      '<div class="row2"><div class="field"><label>'+esc(t('lWeek'))+'</label>'+selWeeks('f_week',STATE.filterWeek||'')+'</div>'+
      '<div class="field"><label>'+esc(t('lRole'))+'</label>'+roleSel('f_role')+'</div></div>'+
      '<div class="field"><label>'+esc(t('lComment'))+'</label><textarea id="f_original" maxlength="1000" placeholder="'+attr(t('phComment'))+'"></textarea></div>'+
      '<input class="hp" id="f_hp" tabindex="-1" autocomplete="off" placeholder="Leave empty">'+
      '<button class="btn" id="f_submit">'+esc(t('btnSubmit'))+'</button><div class="form-msg" id="f_msg"></div></div>';
  return '<div class="view"><div class="eyebrow">'+esc(t('ebFeedback'))+'</div><div class="fb-layout"><div>'+composer+'</div>'+
    '<div><div class="feed-head"><span class="ft">'+esc(t('feedTitle'))+'</span>'+
      selWeeks('flt_week',STATE.filterWeek,t('weekAll'))+selVals('flt_team',teamOpts,teamOpts.map(esc),STATE.filterTeam,t('teamAll'))+
      '<span class="spacer"></span><button class="refresh" id="btnRefresh">'+esc(t('refresh'))+'</button><span class="cnt" id="feedCount"></span></div>'+
      '<div id="feed"></div></div></div></div>';
}
function selVals(id,vals,labels,cur,ph){
  let o = ph!=null ? '<option value="">'+esc(ph)+'</option>' : '<option value="">'+esc(t('pick'))+'</option>';
  o += vals.map((v,i)=>'<option value="'+attr(v)+'"'+(v===cur?' selected':'')+'>'+labels[i]+'</option>').join('');
  return '<select id="'+id+'">'+o+'</select>';
}
function selWeeks(id,cur,ph){ return selVals(id, WEEK_VALS, WEEK_VALS.map(v=>esc(weekLabel(v))), cur, ph); }
function roleLabel(v){ if(v==='writer') return LANG==='ja'?'作家':'작가'; if(v==='pd') return 'PD'; return v||''; }
function roleIcon(v){ return v==='pd'?'🎬':(v==='writer'?'✍️':''); }
function roleBadge(v){ const ic=roleIcon(v), lbl=roleLabel(v); return esc((ic?ic+' ':'')+lbl); }
function roleSel(id){ return '<select id="'+id+'"><option value="writer">'+esc(roleLabel('writer'))+'</option><option value="pd">'+esc(roleLabel('pd'))+'</option></select>'; }
function writerTeam(name){ for(const x of STATE.roster){ if((x.members||[]).some(m=>m.name===name)) return x.team; } return ''; }

function renderFeed(){
  const list=STATE.comments.filter(c=>(!STATE.filterWeek||c.week===STATE.filterWeek)&&(!STATE.filterTeam||c.team===STATE.filterTeam));
  const feed=document.getElementById('feed'), cnt=document.getElementById('feedCount');
  if(cnt) cnt.textContent=list.length+t('uCount');
  if(!feed) return;
  if(!list.length){ feed.innerHTML='<div class="empty"><div class="big">'+esc(t('feedEmptyTitle'))+'</div><div>'+esc(t('feedEmptyBody'))+'</div></div>'; return; }
  feed.innerHTML=list.map(c=>commentHTML(c,false)).join('');
}
function commentHTML(c,fresh){
  const col=tcolor(c.team);
  const teamPill=c.team?'<span class="pill team" style="background:'+col+'">'+esc(c.team)+'</span>':'';
  return '<div class="comment'+(fresh?' fresh':'')+'"><div class="meta">'+
    (c.week?'<span class="pill week">'+esc(weekLabel(c.week))+'</span>':'')+teamPill+
    '<span class="writer">'+esc(c.writer)+'</span>'+
    '<span class="right">'+roleBadge(c.author)+(c.date?' · '+esc(c.date):'')+'</span></div>'+
    '<div class="orig">'+esc(c.original)+'</div>'+
    '<div class="langs"><div class="lang"><div class="lh">🇰🇷 한국어</div><div class="lt">'+esc(c.ko||'—')+'</div></div>'+
    '<div class="lang"><div class="lh">🇯🇵 日本語</div><div class="lt">'+esc(c.ja||'—')+'</div></div></div></div>';
}

/* ── 이벤트 바인딩 ── */
function wire(){
  if(STATE.view==='dash' && STATE.isAdmin) wireAdmin();
  if(STATE.view==='feedback') wireFeedback();
}
function wireAdmin(){
  document.querySelectorAll('.chip-del').forEach(el=> el.addEventListener('click', ()=> delMember(el.getAttribute('data-id'))));
  document.querySelectorAll('.am-add').forEach(el=> el.addEventListener('click', ()=>{
    const box=el.closest('.mini');
    addMember(box.getAttribute('data-team'), box.querySelector('.am-name').value, box.querySelector('.am-country').value, box.querySelector('.am-note').value);
  }));
  document.querySelectorAll('.te-save').forEach(el=> el.addEventListener('click', ()=>{
    const box=el.closest('.team-edit');
    saveTeam(box.getAttribute('data-team'), box.querySelector('.te-cm').value, box.querySelector('.te-docs').value);
  }));
  const nt=document.getElementById('nt-add'); if(nt) nt.addEventListener('click', addTeam);
}
function wireFeedback(){
  renderFeed();
  bind('flt_week','change',e=>{STATE.filterWeek=e.target.value; renderFeed();});
  bind('flt_team','change',e=>{STATE.filterTeam=e.target.value; renderFeed();});
  bind('btnRefresh','click',async()=>{ await loadComments(); renderFeed(); });
  const btn=document.getElementById('f_submit'); if(btn) btn.addEventListener('click', submitComment);
}
function bind(id,ev,fn){ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); }

/* ── 관리자 CRUD ── */
async function addMember(team,name,country,note){
  name=(name||'').trim(); if(!name) return;
  try{ const {error}=await db.from('members').insert({team:team,name:name,country:country||'KR',note:(note||'').trim()}); if(error) throw error; await loadRoster(); render(); }
  catch(e){ alert(t('msgFail')); }
}
async function delMember(id){
  if(!id) return; if(!window.confirm(t('delConfirm'))) return;
  try{ const {error}=await db.from('members').delete().eq('id',id); if(error) throw error; await loadRoster(); render(); }
  catch(e){ alert(t('msgFail')); }
}
async function saveTeam(team,cm,docs){
  try{ const {error}=await db.from('teams').update({cm:(cm||'').trim(),docs_url:(docs||'').trim()}).eq('team',team); if(error) throw error; await loadRoster(); render(); }
  catch(e){ alert(t('msgFail')); }
}
async function addTeam(){
  const key=(val('nt-key')||'').trim().toUpperCase(); const cm=(val('nt-cm')||'').trim();
  if(!key) return;
  try{ const {error}=await db.from('teams').insert({team:key,cm:cm,sort:99}); if(error) throw error; await loadRoster(); render(); }
  catch(e){ alert(t('msgFail')); }
}

/* ── 코멘트 ── */
async function submitComment(){
  const msg=document.getElementById('f_msg'), btn=document.getElementById('f_submit');
  if(val('f_hp')){ return; }
  const week=val('f_week'), writer=val('f_writer'), role=val('f_role')||'writer', original=val('f_original').trim();
  const team=writerTeam(writer);
  if(!week || !writer || !original){ msg.className='form-msg err'; msg.textContent=t('msgReq'); return; }
  btn.disabled=true; msg.className='form-msg'; msg.textContent=t('msgSaving');
  try{
    const tr=await bilingual(original);
    const row={ week, team, writer, author: role, original, ko:tr.ko, ja:tr.ja };
    const { error }=await db.from('comments').insert(row);
    if(error) throw error;
    STATE.comments.unshift(Object.assign({ date:new Date().toISOString().slice(0,10) }, row));
    document.getElementById('f_original').value='';
    msg.className='form-msg ok'; msg.textContent=t('msgSaved');
    renderFeed();
    const first=document.querySelector('#feed .comment'); if(first) first.classList.add('fresh');
    setTimeout(()=>{ if(msg) msg.textContent=''; }, 2500);
  }catch(e){ msg.className='form-msg err'; msg.textContent=t('msgFail'); }
  finally{ btn.disabled=false; }
}

/* ── 閲覧パスコード（合言葉）ゲート ── */
const GATE_KEY='wr_gate_ok_v1';
const GATE_ON = !!(GATE_HASH && GATE_HASH.length===64);
async function sha256hex(s){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function gateUnlocked(){ try{ return localStorage.getItem(GATE_KEY)==='1'; }catch(e){ return false; } }
function showGate(){ const g=document.getElementById('gate'); g.style.display='flex'; const i=document.getElementById('gate_pw'); if(i) i.focus(); }
function hideGate(){ document.getElementById('gate').style.display='none'; }
async function tryUnlock(){
  const msg=document.getElementById('gate_msg');
  const pw=document.getElementById('gate_pw').value;
  if(!pw){ return; }
  let h=''; try{ h=await sha256hex(pw); }catch(e){ h=''; }
  if(h===GATE_HASH){ try{ localStorage.setItem(GATE_KEY,'1'); }catch(e){} hideGate(); boot(); }
  else { msg.textContent='비밀번호가 올바르지 않습니다 · パスワードが違います'; }
}
document.getElementById('gate_go').addEventListener('click', tryUnlock);
document.getElementById('gate_pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

if(!GATE_ON || gateUnlocked()){ boot(); } else { showGate(); }
</script>
